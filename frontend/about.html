<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About - Kontak</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f0fdfa 0%, #eff6ff 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(15, 118, 110, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .contact-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }

      .contact-item {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 14px 16px;
        background: #fafafa;
      }

      .label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .value {
        font-size: 16px;
        font-weight: 600;
      }

      .value a {
        color: var(--accent);
        text-decoration: none;
      }

      .value a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>About Me</h1>
      <p class="subtitle">Hubungi saya melalui kontak berikut:</p>

      <ul class="contact-list">
        <li class="contact-item">
          <div class="label">WhatsApp</div>
          <div class="value">
            <a
              href="https://wa.me/6281234567890"
              target="_blank"
              rel="noopener noreferrer"
              >+62 812-3456-7890</a
            >
          </div>
        </li>

        <li class="contact-item">
          <div class="label">Telegram</div>
          <div class="value">
            <a
              href="https://t.me/username_telegram"
              target="_blank"
              rel="noopener noreferrer"
              >@username_telegram</a
            >
          </div>
        </li>

        <li class="contact-item">
          <div class="label">Facebook</div>
          <div class="value">
            <a
              href="https://facebook.com/username.facebook"
              target="_blank"
              rel="noopener noreferrer"
              >facebook.com/username.facebook</a
            >
          </div>
        </li>
      </ul>
    </main>
  </body>
</html>
