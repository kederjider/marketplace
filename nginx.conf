# Nginx config for Marketplace app
# - HTTP (80) -> HTTPS (443)
# - Reverse proxy to app on 127.0.0.1:5000
# - Allow only GET and POST methods
# - Block suspicious/random attack-style URLs with 404

upstream marketplace_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name parasmark.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parasmark.me;

    # You can edit these certificate paths later.
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Only allow GET and POST requests
    if ($request_method !~ ^(GET|POST)$) {
        return 405;
    }

    # Block hidden files and git-like paths
    location ~ /\.(?!well-known).* {
        return 404;
    }

    # Block common probing/scanner paths
    location ~* ^/(?:wp-admin|wp-login|xmlrpc\.php|vendor|cgi-bin|phpmyadmin|\.git|\.env) {
        return 404;
    }

    # Block suspicious URL patterns
    location ~* (\.\./|%2e%2e|%2f|%5c) {
    return 403;
    }
    # Block risky file extension probes
    location ~* \.(?:php|phtml|phar|asp|aspx|jsp|cgi|pl|sh|bak|old|sql|ini|log|env)$ {
        return 404;
    }

    # Custom 404 page for blocked/random URLs
    error_page 404 /notfound.html;
    location = /notfound.html {
        root /var/www/frontend;
        internal;
    }

    location / {
        # Intercept 404 from upstream and serve custom notfound page
        proxy_intercept_errors on;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_pass http://marketplace_app;
    }
}